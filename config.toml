# Accursed Tokens — Configuration
# Commit this file. Do NOT put secrets here — use environment variables.

[schedule]
# Weekly token reset: Wednesday ~06:00 AM
reset_day = "wednesday"
reset_time = "06:00"
timezone = "Pacific Time"  # update to your local timezone

# Cron fires 18 hours before reset: Tuesday 12:00 PM
cron_expression = "0 12 * * TUE"

[tokens]
# Stop scheduling new sessions when /usage reaches this threshold.
# Leaves a safety margin to avoid a mid-session cutoff.
stop_at_pct = 95.0

# Subscription tier — informational only; actual limits are measured by calibrate.py
subscription_tier = "pro"

[notifications]
# notify.py uses ntfy.sh (HTTPS push, no auth required) — set these in harness env vars:
#
#   NTFY_TOPIC        — unique topic name you subscribe to in the ntfy app
#                       (receive orchestrator notifications on your phone)
#   NTFY_REPLY_TOPIC  — unique topic name you publish to in order to reply
#                       (orchestrator polls this for your /usage % or redirects)
#
# SETUP (one-time):
#   1. Install "ntfy" app on your phone (iOS/Android) — or use ntfy.sh in browser
#   2. Subscribe to your chosen NTFY_TOPIC  (e.g. accursed-tokens-abc123-notify)
#   3. To reply, publish to NTFY_REPLY_TOPIC via the ntfy app or:
#        curl -d "42%" https://ntfy.sh/$NTFY_REPLY_TOPIC
#
# Pick random-enough topic names to avoid collision with other ntfy.sh users.
# Example:
#   NTFY_TOPIC       = "accursed-tokens-saumirah-notify"
#   NTFY_REPLY_TOPIC = "accursed-tokens-saumirah-reply"
#
# Note: Gmail SMTP/IMAP (ports 465/993) are blocked in the remote execution
# environment. ntfy.sh uses HTTPS (port 443) which is allowed.