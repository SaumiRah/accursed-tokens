# Accursed Tokens — Configuration
# Commit this file. Do NOT put secrets here — use environment variables.

[schedule]
# Weekly token reset: Wednesday ~06:00 AM
reset_day = "wednesday"
reset_time = "06:00"
timezone = "Pacific Time"  # update to your local timezone

# Cron fires 18 hours before reset: Tuesday 12:00 PM
cron_expression = "0 12 * * TUE"

[tokens]
# Stop scheduling new sessions when /usage reaches this threshold.
# Leaves a safety margin to avoid a mid-session cutoff.
stop_at_pct = 95.0

# Subscription tier — informational only; actual limits are measured by calibrate.py
subscription_tier = "pro"

[notifications]
# notify.py talks to the user via a Telegram bot (Bot API over HTTPS).
#
# Mechanism:
#   - send: posts a message to your chat with the bot
#   - poll: watches that chat for your reply (e.g. "42%")
#
# SETUP (one-time):
#   1. In Telegram, message @BotFather -> /newbot -> copy the bot token.
#   2. Message your new bot anything (e.g. "hi") so it knows your chat.
#   3. Visit https://api.telegram.org/bot<TOKEN>/getUpdates and read
#      result[0].message.chat.id — that's your chat id.
#   4. Set these env vars in the harness environment (secrets, not here):
#        ACCURSED_TOKENS_NOTIFY_TELEGRAM_BOT_TOKEN
#        ACCURSED_TOKENS_NOTIFY_TELEGRAM_CHAT_ID
#   5. IMPORTANT: add api.telegram.org to the environment's network egress
#      allowlist. Without this, every call fails with "Host not in allowlist"
#      (403) — the same failure mode that previously broke ntfy.sh and the
#      GitHub Issues mechanism. Reply by typing in the chat from the Telegram
#      app or web.
#
# Why Telegram: Gmail SMTP/IMAP (ports 465/993) need raw TCP and are blocked
# in the remote execution environment; ntfy.sh's cloud IP got denylisted
# (403); GitHub Issues needed `gh` auth some remote sessions didn't have.
# Telegram's Bot API is a single HTTPS host, reachable with plain HTTP
# requests once allowlisted, and genuinely two-way via chat messages.