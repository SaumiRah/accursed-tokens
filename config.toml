# Accursed Tokens — Configuration
# Commit this file. Do NOT put secrets here — use environment variables.

[schedule]
# Weekly token reset: Wednesday ~06:00 AM
reset_day = "wednesday"
reset_time = "06:00"
timezone = "Pacific Time"  # update to your local timezone

# Cron fires 18 hours before reset: Tuesday 12:00 PM
cron_expression = "0 12 * * TUE"

[tokens]
# Stop scheduling new sessions when /usage reaches this threshold.
# Leaves a safety margin to avoid a mid-session cutoff.
stop_at_pct = 95.0

# Subscription tier — informational only; actual limits are measured by calibrate.py
subscription_tier = "pro"

[notifications]
# notify.py talks to the user via GitHub Issues using the `gh` CLI.
# No secrets, no config here, no env vars: it reuses the ambient GitHub auth
# that the orchestrator already uses to push commits.
#
# Mechanism:
#   - send: opens an issue on this repo with the plan
#   - poll: watches that issue's comments for your reply (e.g. "42%")
#
# SETUP (one-time):
#   1. Make sure you're watching this repo / have GitHub mobile notifications on
#      so new issues reach your phone.
#   2. Reply by commenting on the issue from the GitHub app or web.
#
# Why GitHub: Gmail SMTP/IMAP (ports 465/993) are blocked in the remote
# execution environment, and ntfy.sh denylists the remote cloud IP (403).
# GitHub's API works there (the agent already clones/pushes over it) and is
# genuinely two-way via issue comments.